name: 🔁 Manual Condensed Game Check

on:
  workflow_dispatch:
    inputs:
      force:
        description: 'Force post even if already logged'
        required: false
        default: 'true'

jobs:
  force-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run the bot with force
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          FORCE_POST: ${{ github.event.inputs.force }}
        run: python run_bot.py

      - name: Commit posted_games.txt
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add posted_games.txt
          git diff --cached --quiet || git commit -m "chore: update posted_games.txt [skip ci]"
          git push
